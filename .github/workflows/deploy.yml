name: Rebuild Page

on:
  schedule:
    - cron: "7 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m sweepreader run --config config.yaml

      - name: Commit data shards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/items/ data/classifications/ || true
          git add -f data/state.json || true
          git diff --cached --quiet || git commit -m "chore: update data shards [skip ci]"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Flag failures
        if: always()
        run: |
          python -c "
          import json, sys
          try:
              state = json.load(open('data/state.json'))
              health = state.get('source_health', {})
              errors = sum(1 for src in health.values() if src.get('status') == 'error')
              if errors > 0:
                  print(f'::warning::{errors} source(s) failed with critical errors this run')
                  sys.exit(1)
          except FileNotFoundError:
              pass
          "
