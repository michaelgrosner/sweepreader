model: "anthropic/claude-haiku-4-5"
suppress_threshold: 35
trailing_days: 14
page_url: "https://michaelgrosner.github.io/sweepreader/"
profile_prompt: |
  Director-level engineer on US equity-options market-making infrastructure.
  Cares most about: protocol/spec changes, new venues & order types, certification
  windows, feed-product changes, connectivity. Interested in market-structure
  direction. Bored by routine fee filings, halts, corporate actions, M&A.

tier_weights:
  A: 1.00
  B: 0.85
  C: 0.55
  D: 0.40
  E: 0.10

sources:
  - id: fed_register_sro
    modality: api
    endpoint: "https://www.federalregister.gov/api/v1/documents.json?conditions%5Bagencies%5D%5B%5D=securities-and-exchange-commission&conditions%5Bterm%5D=self-regulatory&per_page=40&order=newest"
    default_tier_hint: D
    weight: 1.0
    parse: federal_register
    enabled: true

  - id: cboe_options_tech
    modality: rss
    endpoint: "https://www.cboe.com/us/options/support/technical/rss"
    default_tier_hint: A
    weight: 1.0
    parse: rss_generic
    enabled: true

  - id: cboe_equities_tech
    modality: rss
    endpoint: "https://www.cboe.com/us/equities/support/technical/rss"
    default_tier_hint: A
    weight: 1.0
    parse: rss_generic
    enabled: true

  - id: cboe_futures_tech
    modality: rss
    endpoint: "https://www.cboe.com/us/futures/support/technical/rss"
