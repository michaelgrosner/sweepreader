model: "deepseek/deepseek-v4-flash"
suppress_threshold: 35
trailing_days: 14
classify_concurrency: 8
page_url: "https://michaelgrosner.github.io/sweepreader/"
profile_prompt: |
  Director-level engineer on US equity-options market-making infrastructure.
  Cares most about: protocol/spec changes, new venues & order types, certification
  windows, feed-product changes, connectivity. Interested in market-structure
  direction. Bored by routine fee filings, halts, corporate actions, M&A.

  Market scope — US ONLY. Non-US venues (CBOE Canada, CBOE Europe, CBOE UK,
  Cboe Australia, Euronext, LSE, TSX, etc.) are irrelevant → always tier E.

  Venue priority within US markets:
    Highest — US options exchanges: Cboe (BZX/C2/EDGX), Nasdaq ISE/PHLX/MRX/GEMX/BX,
      MIAX/Pearl/Emerald, BOX, NYSE American Options, NYSE Arca Options, MEMX Options.
    Medium  — US equity-only venues: NYSE, Nasdaq, MEMX, IEX, LTSE, MIAX Pearl Equities.
    Lower   — US futures/index venues: CFE, CME, ICE Futures US.
    Ignore  — international indices, foreign sovereign bonds, crypto.

tier_weights:
  A: 1.00
  B: 0.85
  C: 0.55
  D: 0.40
  E: 0.10

sources:
  - id: fed_register_sro
    modality: api
    endpoint: "https://www.federalregister.gov/api/v1/documents.json?conditions%5Bagencies%5D%5B%5D=securities-and-exchange-commission&conditions%5Bterm%5D=self-regulatory&per_page=40&order=newest"
    default_tier_hint: D
    weight: 1.0
    parse: federal_register
    enabled: true

  - id: cboe_options_tech
    modality: rss
    endpoint: "https://www.cboe.com/us/options/support/technical/rss"
    default_tier_hint: A
    weight: 1.0
    parse: rss_generic
    enabled: true

  - id: cboe_equities_tech
    modality: rss
    endpoint: "https://www.cboe.com/us/equities/support/technical/rss"
    default_tier_hint: A
    weight: 1.0
    parse: rss_generic
    enabled: true

  - id: cboe_futures_tech
    modality: rss
    endpoint: "https://www.cboe.com/us/futures/support/technical/rss"
    default_tier_hint: B
    weight: 0.9
    parse: rss_generic
    enabled: true

  - id: nasdaqtrader_options_tech
    modality: rss
    endpoint: "https://www.nasdaqtrader.com/rss.aspx?feed=currentheadlines&categorylist=12"
    default_tier_hint: A
    weight: 1.0
    parse: rss_generic
    enabled: true

  - id: nasdaqtrader_options_reg
    modality: rss
    endpoint: "https://www.nasdaqtrader.com/rss.aspx?feed=currentheadlines&categorylist=13"
    default_tier_hint: B
    weight: 1.0
    parse: rss_generic
    enabled: true

  - id: nasdaqtrader_equity_tech
    modality: rss
    endpoint: "https://www.nasdaqtrader.com/rss.aspx?feed=currentheadlines&categorylist=7"
    default_tier_hint: A
    weight: 0.9
    parse: rss_generic
    enabled: true

  - id: nasdaqtrader_data_tech
    modality: rss
    endpoint: "https://www.nasdaqtrader.com/rss.aspx?feed=currentheadlines&categorylist=48"
    default_tier_hint: A
    weight: 0.95
    parse: rss_generic
    enabled: true

  - id: nasdaqtrader_halt
    modality: rss
    endpoint: "https://www.nasdaqtrader.com/rss.aspx?feed=tradehalts"
    default_tier_hint: E
    weight: 0.5
    parse: rss_generic
    enabled: true

  - id: occ_alerts
    modality: rss
    # theocc.com/infomemo blocks bots via Akamai WAF regardless of User-Agent.
    # Disabled until an alternative endpoint or scraper is implemented.
    endpoint: "https://infomemo.theocc.com/infomemos?format=rss"
    default_tier_hint: A
    weight: 1.0
    parse: rss_generic
    enabled: false

  - id: cat_nms
    modality: rss
    endpoint: "https://www.catnmsplan.com/rss/topics.xml"
    default_tier_hint: B
    weight: 0.9
    parse: rss_generic
    enabled: true

  - id: finra_regulatory
    modality: rss
    endpoint: "https://www.finra.org/rules-guidance/notices/rss"
    default_tier_hint: B
    weight: 0.85
    parse: rss_generic
    enabled: true

  - id: sec_press
    modality: rss
    endpoint: "https://www.sec.gov/news/pressreleases.rss"
    default_tier_hint: B
    weight: 0.85
    parse: rss_generic
    enabled: true

  - id: memx_notices
    modality: rss
    endpoint: "https://info.memxtrading.com/category/alerts-notices/feed/"
    default_tier_hint: A
    weight: 1.0
    parse: rss_generic
    enabled: true

  - id: miax_options
    modality: scrape
    endpoint: "https://www.miaxglobal.com/markets/us-options/all-options-exchange/alerts"
    default_tier_hint: A
    weight: 0.95
    parse: miax_alerts
    enabled: true
  - id: miax_equities
    modality: scrape
    endpoint: "https://www.miaxglobal.com/markets/us-equities/pearl-equities/alerts"
    default_tier_hint: A
    weight: 0.9
    parse: miax_alerts
    enabled: true
  - id: miax_futures
    modality: scrape
    endpoint: "https://www.miaxglobal.com/markets/futures/miax-futures/alerts"
    default_tier_hint: A
    weight: 0.85
    parse: miax_alerts
    enabled: true

  - id: nyse_trader_updates
    modality: api
    endpoint: "https://www.nyse.com/api/notifications/public/system/1/summaries/filter"
    default_tier_hint: A
    weight: 0.95
    parse: nyse_notifications
    enabled: true

  # BOX notices: scrape the /notices listing for each circular's PDF "View
  # Document" link, then extract the PDF text (the real notice body). The listing
  # is behind a Cloudflare header gate (browser sec-ch-ua/Sec-Fetch headers pass
  # it); on a hard block the adapter falls back to the title-only RSS feed.
  - id: box_notices
    modality: scrape
    endpoint: "https://boxexchange.com/notices"
    default_tier_hint: A
    weight: 0.9
    parse: box_notices
    enabled: true

  - id: email_miax
    modality: email
    address: "you+miax@gmail.com"
    default_tier_hint: A
    weight: 0.95
    parse: email_html_or_pdf
    enabled: false

  - id: email_nyse
    modality: email
    address: "you+nyse@gmail.com"
    default_tier_hint: A
    weight: 0.95
    parse: email_html_or_pdf
    enabled: false

  - id: email_box
    modality: email
    address: "you+box@gmail.com"
    default_tier_hint: A
    weight: 0.9
    parse: email_html_or_pdf
    enabled: false

  # IEX Trading Alerts: public, paginated JSON API behind notifications.iex.io.
  # Content is inline (no detail fetch). Covers IEX Options + Equities alerts.
  - id: iex_alerts
    modality: api
    endpoint: "https://api.notifications.iex.io/api/v1/public/trading-alerts"
    default_tier_hint: A
    weight: 0.9
    parse: iex_alerts
    enabled: true

  - id: email_iex
    modality: email
    address: "you+iex@gmail.com"
    default_tier_hint: A
    weight: 0.9
    parse: email_html_or_pdf
    enabled: false

  - id: email_24x
    modality: email
    address: "you+24x@gmail.com"
    default_tier_hint: B
    weight: 0.85
    parse: email_html_or_pdf
    enabled: false
